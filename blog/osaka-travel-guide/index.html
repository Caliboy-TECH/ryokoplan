 rgba(213,143,82,.18);color:#a8682d;font-size:.86rem;font-weight:700}h1{font-size:clamp(2rem,4vw,3.5rem);letter-spacing:-.05em;line-height:1;margin:18px 0 10px}.sub{font-size:1.12rem;color:var(--muted);margin:0 0 14px}.lead{color:var(--muted);line-height:1.8}.content{display:grid;gap:16px;padding:18px 0 56px}.card{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.card h2{margin:0 0 8px;font-size:1.2rem}.card p{margin:0;color:var(--muted);line-height:1.8}footer{padding:18px 0 40px;color:var(--muted);border-top:1px solid rgba(39,68,99,.08)}@media(max-width:720px){.intro{padding:20px}}</style></head><body><div class="top"><div class="shell topin"><a class="ghost" href="/blog" id="back">← Blog</a><div class="lang"><button class="active" data-lang="ko">한국어</button><button data-lang="en">EN</button><button data-lang="ja">日本語</button><button data-lang="zh">简体中文</button></div></div></div><section class="hero"><div class="shell"><div class="cover"><img id="coverimg" src="" alt="city image"/><div class="intro"><div class="eyebrow" id="city"></div><h1 id="title"></h1><p class="sub" id="subtitle"></p><p class="lead" id="intro"></p></div></div><div class="content"><article class="card"><h2 id="s1"></h2><p id="p1"></p></article><article class="card"><h2 id="s2"></h2><p id="p2"></p></article><article class="card"><h2 id="s3"></h2><p id="p3"></p></article></div></div></section><footer><div class="shell">© 2026 Ryokoplan · <a href="/">Planner</a></div></footer><script>const DATA={"img": "https://images.unsplash.com/photo-1590559899731-a382839e5549?auto=format&fit=crop&w=1400&q=80", "ko": {"city": "오사카", "title": "오사카 여행 가이드", "subtitle": "먹방 동선, 가족 페이스, 쉬운 근교", "intro": "오사카는 먹는 시간과 쉬는 시간을 잘 섞을수록 만족도가 높아집니다.", "s1": "숙소 위치", "p1": "난바는 먹거리와 야간 동선이 강하고, 우메다는 교통이 편합니다. 가족이라면 객실 크기와 역 접근을 함께 봐야 합니다.", "s2": "일정 리듬", "p2": "도톤보리 같은 밀집 구역은 반나절 이상 잡지 않는 편이 좋습니다. 오후에는 카페나 강변 산책으로 템포를 낮추면 훨씬 덜 지칩니다.", "s3": "근교 추가", "p3": "나라나 교토를 넣는다면 오사카 시내를 하루 비우는 편이 좋습니다. 욕심내서 같은 날 묶으면 흐름이 무너집니다."}, "en": {"city": "Osaka", "title": "Osaka Travel Guide", "subtitle": "Food-heavy days, family flow, and easy day trips", "intro": "Osaka works best when meals, breaks, and movement stay in balance.", "s1": "Where to stay", "p1": "Namba is strong for food and late-night energy, while Umeda is more convenient for rail connections. Families should weigh room size and station access together.", "s2": "Daily rhythm", "p2": "Dense areas like Dotonbori rarely need more than half a day. Lower the pace in the afternoon with a cafe stop or river walk.", "s3": "Adding day trips", "p3": "If you add Nara or Kyoto, give them their own day. Trying to combine them with a full Osaka city day usually feels rushed."}, "ja": {"city": "大阪", "title": "大阪旅行ガイド", "subtitle": "食べ歩き動線、家族ペース、気軽な近郊", "intro": "大阪は食事、休憩、移動のバランスが取れているほど満足度が上がります。", "s1": "宿の位置", "p1": "なんばは食と夜の動線が強く、梅田は鉄道移動が便利です。家族旅行なら部屋の広さと駅アクセスを一緒に見るのが大切です。", "s2": "1日のリズム", "p2": "道頓堀のような密集エリアは半日程度で十分なことが多いです。午後はカフェや川沿い散歩でペースを落とすと楽になります。", "s3": "近郊を足すなら", "p3": "奈良や京都を入れるなら、その日は大阪市内を欲張らない方が自然です。"}, "zh": {"city": "大阪", "title": "大阪旅行指南", "subtitle": "吃喝路线、家庭节奏与轻松近郊", "intro": "大阪最适合把吃饭、休息和移动安排得平衡一些。", "s1": "住哪里", "p1": "难波适合美食和夜间活动，梅田更适合铁路换乘。家庭出行要同时看房间大小和车站距离。", "s2": "每天节奏", "p2": "像道顿堀这样密集的区域，半天通常就够了。下午改成咖啡馆或河边散步，会轻松很多。", "s3": "加近郊怎么加", "p3": "如果要去奈良或京都，最好单独给一天。和完整的大阪市区日硬拼在一起，通常会太赶。"}}; let lang=new URLSearchParams(location.search).get('lang')||'ko'; if(!DATA[lang]) lang='ko'; document.getElementById('coverimg').src='https://images.unsplash.com/photo-1590559899731-a382839e5549?auto=format&fit=crop&w=1400&q=80'; function render(){const d=DATA[lang]; document.documentElement.lang=lang==='zh'?'zh-Hans':lang; document.title=`${d.title} | Ryokoplan`; document.getElementById('city').textContent=d.city; document.getElementById('title').textContent=d.title; document.getElementById('subtitle').textContent=d.subtitle; document.getElementById('intro').textContent=d.intro; document.getElementById('s1').textContent=d.s1; document.getElementById('p1').textContent=d.p1; document.getElementById('s2').textContent=d.s2; document.getElementById('p2').textContent=d.p2; document.getElementById('s3').textContent=d.s3; document.getElementById('p3').textContent=d.p3; document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang)); const u=new URL(location.href); u.searchParams.set('lang',lang); history.replaceState({},'',u);} addEventListener('click',e=>{const b=e.target.closest('[data-lang]'); if(!b)return; lang=b.dataset.lang; render();}); render();</script></body></html>
