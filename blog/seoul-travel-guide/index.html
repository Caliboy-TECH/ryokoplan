<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Ryokoplan Guide</title><meta name="robots" content="index,follow,max-image-preview:large"/><meta property="og:type" content="article"/><meta property="og:image" content="https://ryokoplan.com/assets/og-cover.png"/><link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet"><style>:root{--bg:#f7f2ea;--text:#17324d;--muted:#64788e;--line:rgba(39,68,99,.10);--shadow:0 20px 40px rgba(30,53,79,.08)}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:Inter,"Noto Sans KR","Noto Sans JP","Noto Sans SC",sans-serif;background:linear-gradient(180deg,#fcf8f1,#f3eee7 38%,#eef5f7)}a{text-decoration:none;color:inherit}.shell{width:min(980px,calc(100% - 28px));margin:0 auto}.top{position:sticky;top:0;background:rgba(250,246,239,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.topin{display:flex;justify-content:space-between;align-items:center;gap:12px;min-height:72px;flex-wrap:wrap}.lang{display:flex;gap:8px;flex-wrap:wrap}.lang button,.ghost{border:1px solid rgba(39,68,99,.10);background:rgba(255,255,255,.7);border-radius:999px;padding:10px 14px;font:inherit;color:var(--text);cursor:pointer}.lang button.active{background:rgba(47,126,161,.10);border-color:rgba(47,126,161,.3)}.hero{padding:34px 0 18px}.cover{border-radius:30px;overflow:hidden;box-shadow:var(--shadow);background:#fff;border:1px solid var(--line)}.cover img{width:100%;aspect-ratio:16/8;display:block;object-fit:cover}.intro{padding:26px}.eyebrow{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(213,143,82,.10);border:1px solid rgba(213,143,82,.18);color:#a8682d;font-size:.86rem;font-weight:700}h1{font-size:clamp(2rem,4vw,3.5rem);letter-spacing:-.05em;line-height:1;margin:18px 0 10px}.sub{font-size:1.12rem;color:var(--muted);margin:0 0 14px}.lead{color:var(--muted);line-height:1.8}.content{display:grid;gap:16px;padding:18px 0 56px}.card{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.card h2{margin:0 0 8px;font-size:1.2rem}.card p{margin:0;color:var(--muted);line-height:1.8}footer{padding:18px 0 40px;color:var(--muted);border-top:1px solid rgba(39,68,99,.08)}@media(max-width:720px){.intro{padding:20px}}</style></head><body><div class="top"><div class="shell topin"><a class="ghost" href="/blog" id="back">← Blog</a><div class="lang"><button class="active" data-lang="ko">한국어</button><button data-lang="en">EN</button><button data-lang="ja">日本語</button><button data-lang="zh">简体中文</button></div></div></div><section class="hero"><div class="shell"><div class="cover"><img id="coverimg" src="" alt="city image"/><div class="intro"><div class="eyebrow" id="city"></div><h1 id="title"></h1><p class="sub" id="subtitle"></p><p class="lead" id="intro"></p></div></div><div class="content"><article class="card"><h2 id="s1"></h2><p id="p1"></p></article><article class="card"><h2 id="s2"></h2><p id="p2"></p></article><article class="card"><h2 id="s3"></h2><p id="p3"></p></article></div></div></section><footer><div class="shell">© 2026 Ryokoplan · <a href="/">Planner</a></div></footer><script>const DATA={"img": "/assets/cities/seoul.svg", "ko": {"city": "서울", "title": "서울 여행 가이드", "subtitle": "카페 동네, 궁궐 루트, 야시장 페이스", "intro": "서울은 동네마다 성격이 뚜렷해 하루를 지역별로 나누는 게 좋습니다.", "s1": "어디를 묶을까", "p1": "경복궁·북촌·서촌은 한 묶음, 성수·서울숲·압구정은 또 다른 묶음으로 보면 좋습니다.", "s2": "밤의 서울", "p2": "광장시장, 을지로, 한강공원처럼 밤에 더 살아나는 장소가 많습니다. 낮에 많이 걸었다면 저녁은 밀도 낮은 코스로 바꾸세요.", "s3": "교통 팁", "p3": "지하철이 강하지만 출퇴근 시간대는 복잡합니다. 짧은 구간은 택시가 체감상 더 편할 수 있습니다."}, "en": {"city": "Seoul", "title": "Seoul Travel Guide", "subtitle": "Cafe districts, palace routes, and night-market pacing", "intro": "Seoul works best when you think in neighborhoods, not a giant checklist.", "s1": "How to group the city", "p1": "Keep Gyeongbokgung, Bukchon, and Seochon together, then treat Seongsu, Seoul Forest, and Apgujeong as another cluster.", "s2": "Seoul at night", "p2": "Many places, from Gwangjang Market to Euljiro and riverside parks, come alive after dark. After a heavy walking day, switch to a softer evening plan.", "s3": "Transport tip", "p3": "The subway is excellent, but rush hour gets dense. For short hops, taxis can feel much easier than they look on a map."}, "ja": {"city": "ソウル", "title": "ソウル旅行ガイド", "subtitle": "カフェ街、宮殿ルート、夜市場", "intro": "ソウルは街ごとの個性が強いので、エリア単位で1日を組むのが向いています。", "s1": "エリアのまとめ方", "p1": "景福宮、北村、西村は同じ日、聖水、ソウルの森、狎鴎亭は別の日にまとめると動きやすいです。", "s2": "夜のソウル", "p2": "広蔵市場、乙支路、漢江公園など夜に魅力が増す場所が多いです。たくさん歩いた日は夜を軽めにすると楽です。", "s3": "交通のコツ", "p3": "地下鉄は便利ですが通勤時間帯は混みます。短距離ならタクシーの方が体感的に楽なこともあります。"}, "zh": {"city": "首尔", "title": "首尔旅行指南", "subtitle": "咖啡街区、宫殿路线与夜市节奏", "intro": "首尔更适合按街区思考，而不是把所有景点都塞进一张清单。", "s1": "怎么分区", "p1": "景福宫、北村、西村放在同一天，圣水、首尔林、狎鸥亭放在另一天会更顺。", "s2": "夜晚的首尔", "p2": "广藏市场、乙支路、汉江公园这类地方在晚上更有活力。白天走很多的话，晚上最好切换成更松的路线。", "s3": "交通提示", "p3": "地铁很好用，但高峰期会很挤。短距离时，出租车常常比地图上看起来更轻松。"}}; let lang=new URLSearchParams(location.search).get('lang')||'ko'; if(!DATA[lang]) lang='ko'; document.getElementById('coverimg').src='/assets/cities/seoul.svg'; function render(){const d=DATA[lang]; document.documentElement.lang=lang==='zh'?'zh-Hans':lang; document.title=`${d.title} | Ryokoplan`; document.getElementById('city').textContent=d.city; document.getElementById('title').textContent=d.title; document.getElementById('subtitle').textContent=d.subtitle; document.getElementById('intro').textContent=d.intro; document.getElementById('s1').textContent=d.s1; document.getElementById('p1').textContent=d.p1; document.getElementById('s2').textContent=d.s2; document.getElementById('p2').textContent=d.p2; document.getElementById('s3').textContent=d.s3; document.getElementById('p3').textContent=d.p3; document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang)); const u=new URL(location.href); u.searchParams.set('lang',lang); history.replaceState({},'',u);} addEventListener('click',e=>{const b=e.target.closest('[data-lang]'); if(!b)return; lang=b.dataset.lang; render();}); render();</script></body></html>
