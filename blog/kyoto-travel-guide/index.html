<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Ryokoplan Guide</title><meta name="robots" content="index,follow,max-image-preview:large"/><meta property="og:type" content="article"/><meta property="og:image" content="https://ryokoplan.com/assets/og-cover.png"/><link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet"><style>:root{--bg:#f7f2ea;--text:#17324d;--muted:#64788e;--line:rgba(39,68,99,.10);--shadow:0 20px 40px rgba(30,53,79,.08)}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:Inter,"Noto Sans KR","Noto Sans JP","Noto Sans SC",sans-serif;background:linear-gradient(180deg,#fcf8f1,#f3eee7 38%,#eef5f7)}a{text-decoration:none;color:inherit}.shell{width:min(980px,calc(100% - 28px));margin:0 auto}.top{position:sticky;top:0;background:rgba(250,246,239,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.topin{display:flex;justify-content:space-between;align-items:center;gap:12px;min-height:72px;flex-wrap:wrap}.lang{display:flex;gap:8px;flex-wrap:wrap}.lang button,.ghost{border:1px solid rgba(39,68,99,.10);background:rgba(255,255,255,.7);border-radius:999px;padding:10px 14px;font:inherit;color:var(--text);cursor:pointer}.lang button.active{background:rgba(47,126,161,.10);border-color:rgba(47,126,161,.3)}.hero{padding:34px 0 18px}.cover{border-radius:30px;overflow:hidden;box-shadow:var(--shadow);background:#fff;border:1px solid var(--line)}.cover img{width:100%;aspect-ratio:16/8;display:block;object-fit:cover}.intro{padding:26px}.eyebrow{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(213,143,82,.10);border:1px solid rgba(213,143,82,.18);color:#a8682d;font-size:.86rem;font-weight:700}h1{font-size:clamp(2rem,4vw,3.5rem);letter-spacing:-.05em;line-height:1;margin:18px 0 10px}.sub{font-size:1.12rem;color:var(--muted);margin:0 0 14px}.lead{color:var(--muted);line-height:1.8}.content{display:grid;gap:16px;padding:18px 0 56px}.card{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.card h2{margin:0 0 8px;font-size:1.2rem}.card p{margin:0;color:var(--muted);line-height:1.8}footer{padding:18px 0 40px;color:var(--muted);border-top:1px solid rgba(39,68,99,.08)}@media(max-width:720px){.intro{padding:20px}}</style></head><body><div class="top"><div class="shell topin"><a class="ghost" href="/blog" id="back">← Blog</a><div class="lang"><button class="active" data-lang="ko">한국어</button><button data-lang="en">EN</button><button data-lang="ja">日本語</button><button data-lang="zh">简体中文</button></div></div></div><section class="hero"><div class="shell"><div class="cover"><img id="coverimg" src="" alt="city image"/><div class="intro"><div class="eyebrow" id="city"></div><h1 id="title"></h1><p class="sub" id="subtitle"></p><p class="lead" id="intro"></p></div></div><div class="content"><article class="card"><h2 id="s1"></h2><p id="p1"></p></article><article class="card"><h2 id="s2"></h2><p id="p2"></p></article><article class="card"><h2 id="s3"></h2><p id="p3"></p></article></div></div></section><footer><div class="shell">© 2026 Ryokoplan · <a href="/">Planner</a></div></footer><script>const DATA={"img": "/assets/cities/kyoto.svg", "ko": {"city": "교토", "title": "교토 여행 가이드", "subtitle": "사찰 시간대, 조용한 거리, 계절 감성", "intro": "교토는 어디를 가느냐보다 언제 가느냐가 훨씬 중요합니다.", "s1": "시간대 전략", "p1": "후시미 이나리, 기요미즈데라 같은 곳은 이른 아침이나 늦은 오후가 좋습니다. 한낮엔 혼잡이 크게 올라갑니다.", "s2": "느린 동선", "p2": "교토는 버스보다 걷기+택시 혼합이 더 편할 때가 많습니다. 하루에 사찰을 너무 많이 넣으면 감흥이 둔해집니다.", "s3": "계절 포인트", "p3": "봄과 가을은 정말 아름답지만 예약 경쟁도 강합니다. 숙소와 인기 식당은 일찍 잡는 편이 좋습니다."}, "en": {"city": "Kyoto", "title": "Kyoto Travel Guide", "subtitle": "Temple timing, quiet streets, and seasonal routes", "intro": "In Kyoto, timing matters as much as destination choice.", "s1": "Time your highlights", "p1": "Places like Fushimi Inari and Kiyomizu-dera work far better early in the morning or later in the day. Midday crowds change the feeling completely.", "s2": "Keep the route slow", "p2": "Kyoto often works better with walking plus occasional taxis than nonstop buses. Too many temples in one day can flatten the experience.", "s3": "Seasonal notes", "p3": "Spring and fall are beautiful, but demand is high. Book hotels and popular restaurants earlier than you think."}, "ja": {"city": "京都", "title": "京都旅行ガイド", "subtitle": "寺社の時間帯、静かな通り、季節ルート", "intro": "京都はどこへ行くか以上に、いつ行くかが大切です。", "s1": "時間帯の戦略", "p1": "伏見稲荷や清水寺は早朝か夕方が向いています。昼は混雑で雰囲気が大きく変わります。", "s2": "ゆっくりした動線", "p2": "京都はバスだけに頼るより、徒歩と時々タクシーを混ぜる方が楽なことがあります。寺社を詰め込みすぎないのがコツです。", "s3": "季節のポイント", "p3": "春と秋は特に美しい一方で予約競争も激しいので、宿と人気店は早めがおすすめです。"}, "zh": {"city": "京都", "title": "京都旅行指南", "subtitle": "寺庙时间、安静街道与季节路线", "intro": "在京都，什么时候去往往和去哪里一样重要。", "s1": "安排好时间段", "p1": "像伏见稻荷、清水寺这类地方，更适合清晨或傍晚。中午人潮会明显改变体验。", "s2": "路线放慢一点", "p2": "京都很多时候更适合步行加偶尔打车，而不是全程靠公交。一天塞太多寺庙，会让感受变平。", "s3": "季节提示", "p3": "春秋非常美，但需求也高。酒店和热门餐厅最好比你想的更早预订。"}}; let lang=new URLSearchParams(location.search).get('lang')||'ko'; if(!DATA[lang]) lang='ko'; document.getElementById('coverimg').src='/assets/cities/kyoto.svg'; function render(){const d=DATA[lang]; document.documentElement.lang=lang==='zh'?'zh-Hans':lang; document.title=`${d.title} | Ryokoplan`; document.getElementById('city').textContent=d.city; document.getElementById('title').textContent=d.title; document.getElementById('subtitle').textContent=d.subtitle; document.getElementById('intro').textContent=d.intro; document.getElementById('s1').textContent=d.s1; document.getElementById('p1').textContent=d.p1; document.getElementById('s2').textContent=d.s2; document.getElementById('p2').textContent=d.p2; document.getElementById('s3').textContent=d.s3; document.getElementById('p3').textContent=d.p3; document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang)); const u=new URL(location.href); u.searchParams.set('lang',lang); history.replaceState({},'',u);} addEventListener('click',e=>{const b=e.target.closest('[data-lang]'); if(!b)return; lang=b.dataset.lang; render();}); render();</script></body></html>
