<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Ryokoplan Guide</title><meta name="robots" content="index,follow,max-image-preview:large"/><meta property="og:type" content="article"/><meta property="og:image" content="https://ryokoplan.com/assets/og-cover.png"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet"><style>:root{--bg:#f7f2ea;--text:#17324d;--muted:#64788e;--line:rgba(39,68,99,.10);--shadow:0 20px 40px rgba(30,53,79,.08)}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:Inter,"Noto Sans KR","Noto Sans JP","Noto Sans SC",sans-serif;background:linear-gradient(180deg,#fcf8f1,#f3eee7 38%,#eef5f7)}a{text-decoration:none;color:inherit}.shell{width:min(980px,calc(100% - 28px));margin:0 auto}.top{position:sticky;top:0;background:rgba(250,246,239,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.topin{display:flex;justify-content:space-between;align-items:center;gap:12px;min-height:72px;flex-wrap:wrap}.lang{display:flex;gap:8px;flex-wrap:wrap}.lang button,.ghost{border:1px solid rgba(39,68,99,.10);background:rgba(255,255,255,.7);border-radius:999px;padding:10px 14px;font:inherit;color:var(--text);cursor:pointer}.lang button.active{background:rgba(47,126,161,.10);border-color:rgba(47,126,161,.3)}.hero{padding:34px 0 18px}.cover{border-radius:30px;overflow:hidden;box-shadow:var(--shadow);background:#fff;border:1px solid var(--line)}.cover img{width:100%;aspect-ratio:16/8;display:block;object-fit:cover}.intro{padding:26px}.eyebrow{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(213,143,82,.10);border:1px solid rgba(213,143,82,.18);color:#a8682d;font-size:.86rem;font-weight:700}h1{font-size:clamp(2rem,4vw,3.5rem);letter-spacing:-.05em;line-height:1;margin:18px 0 10px}.sub{font-size:1.12rem;color:var(--muted);margin:0 0 14px}.lead{color:var(--muted);line-height:1.8}.content{display:grid;gap:16px;padding:18px 0 56px}.card{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.card h2{margin:0 0 8px;font-size:1.2rem}.card p{margin:0;color:var(--muted);line-height:1.8}footer{padding:18px 0 40px;color:var(--muted);border-top:1px solid rgba(39,68,99,.08)}@media(max-width:720px){.intro{padding:20px}}</style></head><body><div class="top"><div class="shell topin"><a class="ghost" href="/blog" id="back">← Blog</a><div class="lang"><button class="active" data-lang="ko">한국어</button><button data-lang="en">EN</button><button data-lang="ja">日本語</button><button data-lang="zh">简体中文</button></div></div></div><section class="hero"><div class="shell"><div class="cover"><img id="coverimg" src="" alt="city image"/><div class="intro"><div class="eyebrow" id="city"></div><h1 id="title"></h1><p class="sub" id="subtitle"></p><p class="lead" id="intro"></p></div></div><div class="content"><article class="card"><h2 id="s1"></h2><p id="p1"></p></article><article class="card"><h2 id="s2"></h2><p id="p2"></p></article><article class="card"><h2 id="s3"></h2><p id="p3"></p></article></div></div></section><footer><div class="shell">© 2026 Ryokoplan · <a href="/">Planner</a></div></footer><script>const DATA={"img": "https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=1400&q=80", "ko": {"city": "도쿄", "title": "도쿄 여행 가이드", "subtitle": "지역별 동선, 맛집 존, 첫 여행 페이스", "intro": "도쿄는 크기보다 리듬이 중요한 도시입니다. 지역을 잘 묶으면 훨씬 덜 피곤하고 더 많이 즐길 수 있습니다.", "s1": "어디에 머물까", "p1": "첫 여행이라면 신주쿠·긴자·우에노처럼 환승이 편한 지역이 안정적입니다. 감성 위주라면 시모키타자와나 기요스미시라카와도 좋지만, 일정이 짧다면 이동이 늘어날 수 있습니다.", "s2": "하루를 어떻게 나눌까", "p2": "아사쿠사·우에노는 동쪽, 시부야·하라주쿠·시모키타자와는 서쪽으로 묶으면 좋습니다. 하루에 강을 건너는 횟수를 줄이면 체력이 남습니다.", "s3": "무엇을 챙길까", "p3": "걷는 시간이 길어지는 도시라 편한 신발과 교통카드, 보조배터리가 핵심입니다. 여름엔 작은 수건과 물, 겨울엔 가벼운 외투 레이어가 유용합니다."}, "en": {"city": "Tokyo", "title": "Tokyo Travel Guide", "subtitle": "Neighborhood logic, food zones, and smart pacing", "intro": "Tokyo rewards structure more than speed. Group the right areas together and the city feels much easier and more enjoyable.", "s1": "Where to stay", "p1": "For a first trip, Shinjuku, Ginza, or Ueno are safe bases because transfers are easy. Trendier neighborhoods like Shimokitazawa or Kiyosumi are lovely, but they can add transit time on short trips.", "s2": "How to split your days", "p2": "Keep Asakusa and Ueno on one side, and Shibuya, Harajuku, and Shimokitazawa on another. Fewer long cross-city jumps means less fatigue.", "s3": "What to pack", "p3": "Comfortable shoes, an IC transit card, and a battery pack matter most. In summer, add a small towel and water; in winter, light layers work better than one heavy coat."}, "ja": {"city": "東京", "title": "東京旅行ガイド", "subtitle": "街区ロジック、グルメゾーン、無理のないペース", "intro": "東京は広さよりもリズムが大事な都市です。エリアのまとめ方次第で、体力の消耗がかなり変わります。", "s1": "どこに泊まるか", "p1": "初回なら新宿、銀座、上野のように乗り換えしやすいエリアが安心です。雰囲気重視なら下北沢や清澄白河も魅力的ですが、短期旅行では移動が増えることがあります。", "s2": "1日の分け方", "p2": "浅草・上野は東側、渋谷・原宿・下北沢は西側でまとめるのが基本です。都市を横断する回数を減らすとかなり楽になります。", "s3": "持ち物", "p3": "歩く時間が長いので、履きやすい靴、交通系IC、モバイルバッテリーが重要です。夏は小さなタオルと水、冬は重いコートより重ね着が便利です。"}, "zh": {"city": "东京", "title": "东京旅行指南", "subtitle": "区域逻辑、美食分区与舒适节奏", "intro": "东京比起“冲得快”，更看重结构。把区域分得合理，整趟旅行会轻松很多。", "s1": "住哪里", "p1": "第一次去东京，住在新宿、银座、上野这类换乘方便的区域最稳妥。像下北泽、清澄白河这类更有气质的区域也很好，但短途旅行会增加移动时间。", "s2": "每天怎么分", "p2": "浅草、上野放在东侧一天，涩谷、原宿、下北泽放在西侧一天，会更顺。减少横跨城市的次数，体力会明显更轻松。", "s3": "带什么", "p3": "最重要的是舒适的鞋、交通卡和移动电源。夏天加小毛巾和水，冬天用轻薄分层代替厚重外套更实用。"}}; let lang=new URLSearchParams(location.search).get('lang')||'ko'; if(!DATA[lang]) lang='ko'; document.getElementById('coverimg').src='https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=1400&q=80'; function render(){const d=DATA[lang]; document.documentElement.lang=lang==='zh'?'zh-Hans':lang; document.title=`${d.title} | Ryokoplan`; document.getElementById('city').textContent=d.city; document.getElementById('title').textContent=d.title; document.getElementById('subtitle').textContent=d.subtitle; document.getElementById('intro').textContent=d.intro; document.getElementById('s1').textContent=d.s1; document.getElementById('p1').textContent=d.p1; document.getElementById('s2').textContent=d.s2; document.getElementById('p2').textContent=d.p2; document.getElementById('s3').textContent=d.s3; document.getElementById('p3').textContent=d.p3; document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang)); const u=new URL(location.href); u.searchParams.set('lang',lang); history.replaceState({},'',u);} addEventListener('click',e=>{const b=e.target.closest('[data-lang]'); if(!b)return; lang=b.dataset.lang; render();}); render();</script></body></html>
