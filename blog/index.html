<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryokoplan Magazine</title>
  <meta name="description" content="A mobile-first travel magazine for Tokyo, Osaka, Kyoto, Seoul, Busan, and Fukuoka city guides." />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <div class="brand-row">
        <a href="/" class="brand">
          <span class="brand-mark"><img src="/assets/logo-mark.svg" alt="Ryokoplan"></span>
          <span class="brand-copy"><span class="brand-name"><span class="brand-ryoko">Ryoko</span><span class="brand-plan">plan</span></span><small>Travel Magazine</small></span>
        </a>
        <div class="header-chips">
          <a href="/" class="chip-btn" data-i18n="planner">플래너</a>
          <span class="chip-btn magazine" data-i18n="magazine">매거진</span>
        </div>
      </div>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="ko">한국어</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ja">日本語</button>
        <button class="lang-btn" data-lang="zh">简体中文</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="magazine-hero">
      <div class="magazine-heading">
        <div class="panel">
          <span class="eyebrow">Ryokoplan Magazine</span>
          <h2 data-i18n="magTitle">일본·한국 도시 가이드를 매거진처럼 읽어보세요.</h2>
          <p class="panel-sub" data-i18n="magCopy">도쿄, 오사카, 교토, 서울, 부산, 후쿠오카. 검색 의도에 맞는 도시 가이드와 실제 일정 흐름이 자연스럽게 이어집니다.</p>
          <div class="hero-actions" style="margin-top:8px">
            <a href="/" class="primary-btn" data-i18n="startPlanning">여행 계획 시작</a>
            <a href="/blog" class="ghost-btn" data-i18n="viewMagazine">매거진 보기</a>
          </div>
          <div class="city-pills">
            <span data-city-pill>도쿄</span><span data-city-pill>오사카</span><span data-city-pill>교토</span><span data-city-pill>서울</span><span data-city-pill>부산</span><span data-city-pill>후쿠오카</span>
          </div>
        </div>
        <div class="magazine-visual" id="magazineVisual">
          <div class="magazine-overlay" data-i18n="magOverlay">도시 이미지와 가이드를 같은 톤으로 정리해, 읽는 경험과 플래닝 경험이 끊기지 않도록 구성했습니다.</div>
        </div>
      </div>
    </section>

    <section class="magazine-grid" id="magazineGrid"></section>
  </main>

  <footer class="footer shell">© 2026 Ryokoplan Magazine</footer>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
