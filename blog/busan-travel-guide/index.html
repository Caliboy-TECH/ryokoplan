tContent=d.s2; document.getElementById('p2').textContent=d.p2; document.getElementById('s3').textContent=d.s3; document.getElementById('p3').textContent=d.p3; document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang)); const u=new URL(location.href); u.searchParams.set('lang',lang); history.replaceState({},'',u);} addEventListener('click',e=>{const b=e.target.closest('[data-lang]'); if(!b)return; lang=b.dataset.lang; render();}); render();</script></body></html>
