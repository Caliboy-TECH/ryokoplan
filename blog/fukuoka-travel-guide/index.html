유연하게 움직이세요."}, "en": {"city": "Fukuoka", "title": "Fukuoka Travel Guide", "subtitle": "Short, easy food trips", "intro": "Fukuoka feels best when the city is taken in smaller, softer pieces.", "s1": "The core areas", "p1": "Hakata covers transit and ramen, Tenjin handles shopping and cafes, and Momochi gives the trip some waterfront breathing room.", "s2": "Short itineraries", "p2": "On a 2–3 day trip, keeping the focus inside the city usually feels better than forcing too many extras.", "s3": "Night atmosphere", "p3": "Yatai street stalls are great at night, but you do not need to overcommit to long waits. Keep the evening flexible."}, "ja": {"city": "福岡", "title": "福岡旅行ガイド", "subtitle": "軽やかに歩くグルメ旅", "intro": "福岡は大都市を攻略するというより、小さなエリアをやさしくつなぐ感覚が合います。", "s1": "基本の軸", "p1": "博多は交通とラーメン、天神は買い物とカフェ、ももちは海辺の余白を担います。", "s2": "短い旅程", "p2": "2泊3日なら遠くまで欲張らず、市内の密度を楽しむ方が満足しやすいです。", "s3": "夜の雰囲気", "p3": "屋台は夜に雰囲気が出ますが、長い列にこだわりすぎなくても大丈夫です。体力に合わせて柔軟に。"}, "zh": {"city": "福冈", "title": "福冈旅行指南", "subtitle": "轻松步行的美食短途", "intro": "福冈更适合以几个小区域慢慢连接起来，而不是用“大城市攻坚”的方式去玩。", "s1": "核心区域", "p1": "博多负责交通和拉面，天神负责购物和咖啡，百道给行程留出海边的呼吸感。", "s2": "短行程", "p2": "如果只有2到3天，把重心放在市区里，通常比硬塞更多内容更舒服。", "s3": "夜晚氛围", "p3": "屋台夜市很有感觉，但不必为了排队耗掉太多时间。晚上保持弹性更好。"}}; let lang=new URLSearchParams(location.search).get('lang')||'ko'; if(!DATA[lang]) lang='ko'; document.getElementById('coverimg').src='/assets/cities/fukuoka.svg'; function render(){const d=DATA[lang]; document.documentElement.lang=lang==='zh'?'zh-Hans':lang; document.title=`${d.title} | Ryokoplan`; document.getElementById('city').textContent=d.city; document.getElementById('title').textContent=d.title; document.getElementById('subtitle').textContent=d.subtitle; document.getElementById('intro').textContent=d.intro; document.getElementById('s1').textContent=d.s1; document.getElementById('p1').textContent=d.p1; document.getElementById('s2').textContent=d.s2; document.getElementById('p2').textContent=d.p2; document.getElementById('s3').textContent=d.s3; doc
