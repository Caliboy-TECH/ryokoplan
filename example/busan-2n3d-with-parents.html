<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryokoplan Example</title>
  <link rel="icon" href="../assets/images/brand/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="magazine" data-example-slug="busan-2n3d-with-parents">
  <header class="top-bar">
    <div class="container top-bar-inner">
      <a class="brand" href="../">
        <span class="brand-mark"><img src="../assets/images/brand/logo-mark.svg" alt="Ryokoplan"></span>
        <span class="brand-copy">
          <span class="brand-title"><span class="ryoko">Ryoko</span><span class="plan">plan</span></span>
          <span class="brand-sub" data-t="nav.travelPlanner">Travel Planner</span>
        </span>
      </a>
      <div class="top-actions">
        <div class="lang-switch"><button class="lang-btn" data-lang-btn="ko">KR</button><button class="lang-btn" data-lang-btn="en">EN</button><button class="lang-btn" data-lang-btn="ja">JP</button><button class="lang-btn" data-lang-btn="zhHant">繁</button></div>
        <a class="nav-chip" data-nav="planner" data-t="nav.planner">Planner</a>
        <a class="nav-chip magazine" href="../magazine/" data-t="nav.magazine">Magazine</a>
        <a class="nav-chip trips" data-nav="trips" data-t="nav.trips">My Trips</a>
      </div>
    </div>
  </header>
  <main class="page"><div class="container"><div id="examplePageRoot"></div></div></main>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
