<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryokoplan — AI 여행 일정 만들기</title>
  <style>
    :root { --primary: #6C63FF; --primary-dark: #574fd6; --bg: #f7f8fc; --card: #ffffff; --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb; --success: #10b981; --radius: 16px; --shadow: 0 4px 24px rgba(108,99,255,0.10); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header { background: linear-gradient(135deg, #6C63FF, #9b8ffc); color: white; padding: 48px 24px 56px; text-align: center; }
    header .logo { font-size: 2rem; font-weight: 800; }
    header .logo span { color: #FFD166; }
    header p { margin-top: 8px; opacity: 0.9; }
    main { max-width: 720px; margin: -28px auto 0; padding: 0 16px 60px; }
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; margin-bottom: 24px; }
    .card h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; color: var(--primary); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    input, select { border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 0.95rem; outline: none; background: #fafafa; }
    input:focus, select:focus { border-color: var(--primary); background: white; }
    #generate-btn { width: 100%; margin-top: 24px; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    #generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-box { display: none; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 10px; padding: 14px; margin-top: 16px; color: #b91c1c; }
    #result { display: none; }
    .result-header { text-align: center; padding-bottom: 12px; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    .result-header h3 { font-size: 1.4rem; font-weight: 800; }
    .badge { background: #ede9fe; color: var(--primary); border-radius: 20px; padding: 3px 12px; font-size: 0.8rem; font-weight: 600; margin: 2px; display: inline-block; }
    .day-block { margin-bottom: 28px; }
    .day-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .day-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .activity { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .activity:last-child { border-bottom: none; }
    .activity-time { min-width: 52px; font-size: 0.8rem; font-weight: 700; color: var(--primary); }
    .activity-place { font-weight: 700; }
    .activity-desc { font-size: 0.88rem; color: var(--muted); margin-top: 3px; }
    .activity-tip { margin-top: 6px; font-size: 0.82rem; color: var(--success); background: #ecfdf5; border-radius: 6px; padding: 4px 10px; display: inline-block; }
    .tips-section { margin-top: 24px; display: none; }
    .tips-section h4 { font-weight: 700; margin-bottom: 10px; }
    .tip-item::before { content: '💡 '; }
    .tip-item { font-size: 0.88rem; color: var(--muted); margin-bottom: 6px; }
    .budget-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 14px; font-size: 0.88rem; color: #92400e; margin-top: 16px; display: none; }
    .affiliate { margin-top: 24px; }
    .affiliate h4 { font-weight: 700; margin-bottom: 12px; }
    .aff-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .aff-btn { display: block; text-align: center; padding: 12px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
    .aff-booking { background: #003580; color: white; }
    .aff-klook { background: #FF5722; color: white; }
    .aff-agoda { background: #5392F9; color: white; }
    #reset-btn { width: 100%; margin-top: 12px; padding: 13px; background: white; border: 2px solid var(--primary); color: var(--primary); border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    footer { text-align: center; padding: 24px; font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <div class="logo">ryoko<span>plan</span></div>
  <p>✈️ AI가 나만의 여행 일정을 5초 만에 완성해 드려요</p>
</header>
<main>
  <div class="card" id="form-card">
    <h2>🗺️ 어디로 떠나고 싶으세요?</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>여행지 *</label>
        <input type="text" id="destination" placeholder="예: 도쿄, 파리, 발리, 뉴욕" />
      </div>
      <div class="form-group">
        <label>여행 기간</label>
        <select id="duration">
          <option value="1박 2일">1박 2일</option>
          <option value="2박 3일">2박 3일</option>
          <option value="3박 4일" selected>3박 4일</option>
          <option value="4박 5일">4박 5일</option>
          <option value="5박 6일">5박 6일</option>
          <option value="1주일">1주일</option>
        </select>
      </div>
      <div class="form-group">
        <label>여행 스타일</label>
        <select id="style">
          <option value="일반 관광">🏛️ 일반 관광</option>
          <option value="맛집 위주">🍜 맛집 위주</option>
          <option value="자연/힐링">🌿 자연/힐링</option>
          <option value="쇼핑">🛍️ 쇼핑</option>
          <option value="역사/문화">🎭 역사/문화</option>
          <option value="액티비티">🏄 액티비티</option>
        </select>
      </div>
      <div class="form-group">
        <label>예산</label>
        <select id="budget">
          <option value="절약 여행">💰 절약 여행</option>
          <option value="적당한 예산" selected>💳 적당한 예산</option>
          <option value="럭셔리">✨ 럭셔리</option>
        </select>
      </div>
    </div>
    <button id="generate-btn" onclick="generateItinerary()">
      <span id="btn-icon">✈️</span>
      <span id="btn-text">일정 만들기</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div id="error-box"></div>
  </div>
  <div class="card" id="result">
    <div class="result-header">
      <h3 id="result-title"></h3>
      <div id="result-meta"></div>
    </div>
    <div id="itinerary-days"></div>
    <div class="tips-section" id="tips-section"></div>
    <div class="budget-box" id="budget-box"></div>
    <div class="affiliate">
      <h4>🏨 예약하고 떠나기</h4>
      <div class="aff-grid">
        <a class="aff-btn aff-booking" id="aff-booking" href="https://www.booking.com" target="_blank">🏨 Booking.com</a>
        <a class="aff-btn aff-klook" id="aff-klook" href="https://www.klook.com" target="_blank">🎡 Klook</a>
        <a class="aff-btn aff-agoda" id="aff-agoda" href="https://www.agoda.com" target="_blank">🌙 Agoda</a>
      </div>
    </div>
    <button id="reset-btn" onclick="resetForm()">🔄 다시 만들기</button>
  </div>
</main>
<footer>© 2025 Ryokoplan</footer>
<script>
  async function generateItinerary() {
    const destination = document.getElementById('destination').value.trim();
    if (!destination) { showError('여행지를 입력해 주세요!'); return; }
    setLoading(true); hideError();
    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          destination,
          duration: document.getElementById('duration').value,
          style: document.getElementById('style').value,
          budget: document.getElementById('budget').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류');
      renderItinerary(data, destination);
    } catch (err) {
      showError('❌ ' + (err.message || '일정 생성 실패'));
    } finally { setLoading(false); }
  }

  function renderItinerary(data, destination) {
    document.getElementById('result-title').textContent = data.title || destination + ' 여행';
    document.getElementById('result-meta').innerHTML = '<span class="badge">📅 ' + data.duration + '</span><span class="badge">📍 ' + (data.destination || destination) + '</span>';
    const c = document.getElementById('itinerary-days');
    c.innerHTML = '';
    const icons = {'관광':'🏛️','식사':'🍽️','숙박':'🛏️','이동':'🚌','쇼핑':'🛍️','액티비티':'🎡','자연':'🌿','문화':'🎭'};
    (data.days||[]).forEach(day => {
      const b = document.createElement('div'); b.className = 'day-block';
      b.innerHTML = '<div class="day-title">Day ' + day.day + ' · ' + (day.title||'') + '</div>';
      (day.activities||[]).forEach(a => {
        b.innerHTML += '<div class="activity"><div class="activity-time">' + (a.time||'') + '</div><div><div class="activity-place">' + (icons[a.category]||'📌') + ' ' + a.place + '</div><div class="activity-desc">' + a.description + '</div>' + (a.tip ? '<div class="activity-tip">💚 ' + a.tip + '</div>' : '') + '</div></div>';
      });
      c.appendChild(b);
    });
    const t = document.getElementById('tips-section');
    if (data.tips&&data.tips.length) { t.innerHTML = '<h4>✅ 여행 팁</h4>' + data.tips.map(x=>'<div class="tip-item">'+x+'</div>').join(''); t.style.display='block'; }
    const bb = document.getElementById('budget-box');
    if (data.estimatedBudget) { bb.textContent = '💰 ' + data.estimatedBudget; bb.style.display='block'; }
    const enc = encodeURIComponent(destination);
    document.getElementById('aff-booking').href = 'https://www.booking.com/search.html?ss=' + enc;
    document.getElementById('aff-klook').href = 'https://www.klook.com/search/?query=' + enc;
    document.getElementById('aff-agoda').href = 'https://www.agoda.com/search?q=' + enc;
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  }

  function resetForm() {
    document.getElementById('form-card').style.display='block';
    document.getElementById('result').style.display='none';
    document.getElementById('destination').value='';
    hideError();
  }
  function setLoading(on) {
    document.getElementById('generate-btn').disabled = on;
    document.getElementById('spinner').style.display = on?'block':'none';
    document.getElementById('btn-icon').style.display = on?'none':'inline';
    document.getElementById('btn-text').textContent = on?'생성 중...':'일정 만들기';
  }
  function showError(m) { const e=document.getElementById('error-box'); e.textContent=m; e.style.display='block'; }
  function hideError() { document.getElementById('error-box').style.display='none'; }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('destination').addEventListener('keydown', e => { if(e.key==='Enter') generateItinerary(); });
  });
</script>
</body>
</html>
